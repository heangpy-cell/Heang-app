name: link_grab
description: LINK GRAB - Download videos from all platforms
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  dio: ^5.4.3
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  open_filex: ^4.5.0
  http: ^1.2.1
  shared_preferences: ^2.3.2
  share_plus: ^10.0.2
  flutter_inappwebview: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#13132A"
  adaptive_icon_foreground: "assets/logo.png"
