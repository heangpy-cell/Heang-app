name: "Build Unsigned iOS IPA"

on:
  workflow_dispatch: # Allows manual trigger from GitHub web UI
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Unsigned iOS IPA
    runs-on: macos-14 # Uses latest macOS runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS App (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package into IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r LinkGrab_Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: link-grab-unsigned-ipa
          path: build/ios/iphoneos/LinkGrab_Unsigned.ipa
          if-no-files-found: error
